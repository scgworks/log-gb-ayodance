<!DOCTYPE html>
<html>
<head>
    <title>Ayodance GB Log</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #50fa7b; --text: #f8f8f2; --dim: #6272a4; --log-bg: #21222c;}
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        /* Container adjustments */
        #tracker-container { width: 100%; max-width: 900px; margin: 0 auto; }
        .column { width: 100%; margin-bottom: 25px; box-sizing: border-box; }

        /* The layout: Top (Main), Bottom (Logs + Info) */
        .account-layout { display: flex; flex-direction: column; gap: 20px; }

        .bottom-grid { 
            display: flex; 
            gap: 20px; 
            flex-direction: column; /* Stacks on mobile */
        }

        /* Tablet/Desktop Side-by-Side for the bottom row */
        @media (min-width: 650px) {
            .bottom-grid { flex-direction: row; align-items: flex-start; }
            .log-history { flex: 1; } 
            .acc-info { flex: 1; }
        }

        /* Styling for the new Acc Info box */
        .acc-info {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #8be9fd;
        }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .info-label { color: var(--dim); font-size: 0.65rem; text-transform: uppercase; }
        .info-value { color: #fff; font-size: 0.75rem; font-family: 'Consolas', monospace; }
        /* Each account is now wrapped in this main box */
        .account-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px; /* Space between each account box */
            width: 100%;
            max-width: 850px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
            transition: transform 0.2s ease;
        }

        /* Optional: Slight lift effect on hover */
        .account-card:hover {
            transform: translateY(-2px);
            border-color: var(--dim);
        }

        /* Ensure the nickname stays inside the box styling */
        .nickname { 
            font-size: 1.6rem; 
            color: var(--accent); 
            font-weight: bold; 
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .status { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .online { color: var(--accent); }
        .offline { color: #ff5555; }
        .data-box { 
            background: #21222c; padding: 15px; border-radius: 8px; border: 1px solid #282a36; width: 100%; box-sizing: border-box;
        }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .label { color: var(--dim); font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        .value { color: #fff; font-size: 0.9rem; text-align: right; }

        /* Log History Styling */
        .log-history { 
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border-left: 3px solid var(--accent);
        }
        .log-header { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .log-list { font-family: 'Consolas', monospace; font-size: 0.65rem; color: var(--text); opacity: 0.7; }
        .log-item { padding: 4px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        /* Container to hold both bar and percentage */
        .exp-wrapper {
            display: flex;
            align-items: center;
            gap: 10px; /* Space between bar and text */
            margin: 10px 0;
        }

        /* Ensure the container has a defined height */
        .exp-bar-container { 
            background: #44475a; 
            height: 12px;           /* Must have a height */
            border-radius: 6px; 
            overflow: hidden;
            flex: 1;                /* Grows to fill space next to % */
            display: block;         /* Ensures it renders as a block */
        }

        /* Ensure the fill takes up that full height */
        .exp-bar-fill { 
            background: linear-gradient(90deg, #50fa7b, #8be9fd); 
            height: 100%;           /* Takes 100% of the 12px container */
            width: 0%;              /* Start at 0 */
            transition: width 1s ease-in-out; 
            border-radius: 6px;
        }
        .exp-percent { 
            font-size: 0.8rem; 
            color: var(--accent); 
            font-weight: bold;
            min-width: 50px; /* Prevents layout jump when numbers change */
            text-align: right;
        }
    </style>

                                <div class="acc-info">
                                    <div class="log-header"><span>Acc Info</span><span id="info-sync-${index}">--</span></div>
                                    <div id="info-body-${index}">
                                        <div class="info-row"><span class="info-label">Event</span><span class="info-value" id="info-evt-${index}">--</span></div>
                                        <div class="info-row"><span class="info-label">Mark H</span><span class="info-value" id="info-mark-${index}">--</span></div>
                                        <div class="info-row"><span class="info-label">Pet</span><span class="info-value" id="info-pet-${index}">--</span></div>
                                        <div class="info-row"><span class="info-label">Platform</span><span class="info-value" id="info-plat-${index}">--</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div id="sync-${index}" class="update-time" style="text-align:right; font-size:0.6rem; color: var(--dim); margin-top:15px;"></div>
                    </div>`;
            });
        }

        async function updateAccount(index) {
            const acc = myAccounts[index];
            const today = new Date().toISOString().split('T')[0];
            
            const token = await refreshAccessToken();
            if (!token) return;

            const dbFetch = (path) => fetch('https://content.dropboxapi.com/2/sharing/get_shared_link_file', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Dropbox-API-Arg': JSON.stringify({ "url": acc.link, "path": path })
                }
            });

            try {
                // 1. Fetch Log Data
                const logRes = await dbFetch(`/${today}.txt`);
                if (logRes.ok) {
                    const text = await logRes.text();
                    const lines = text.trim().split('\n');
                    const history = lines.slice(-10).reverse();
                    renderUI(index, lines[lines.length - 1], history);
                }

                // 2. Fetch Info Data
                const infoRes = await dbFetch(`/_Informasi.txt`);
                if (infoRes.ok) {
                    const infoText = await infoRes.text();
                    const infoLines = infoText.split('\n');
                    
                    // Extracting specific lines based on your requirement
                    // Line 6: Last Update (Index 5)
                    // Lines 13-16: Event, Mark, Pet, Platform (Index 12-15)
                    const lastUpd = infoLines[5]?.split(': ')[1] || '--';
                    document.getElementById(`info-sync-${index}`).innerText = lastUpd.split(' ')[1]; // Just time
                    
                    document.getElementById(`info-evt-${index}`).innerText = infoLines[11]?.split(': ')[1] || '--';
                    document.getElementById(`info-mark-${index}`).innerText = infoLines[12]?.split(': ')[1] || '--';
                    document.getElementById(`info-pet-${index}`).innerText = infoLines[13]?.split(': ')[1] || '--';
                    document.getElementById(`info-plat-${index}`).innerText = infoLines[14]?.split(': ')[1] || '--';
                }

            } catch (e) { 
                document.getElementById(`status-${index}`).className = "status offline";
                document.getElementById(`status-${index}`).innerText = "Offline (Link Error)";
            }
        }

        function renderUI(index, line, history) {
            const logTime = line.split('=')[0];
            const statsPart = line.split('=')[1].split('|');

            // --- GMT+7 STALENESS CHECK ---
            const now = new Date();
            const currentWIBStr = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Asia/Jakarta', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).format(now);
            const uDate = new Intl.DateTimeFormat('en-GB', {timeZone: 'Asia/Jakarta', weekday:"short", day:"numeric", month:"short", year:"numeric"}).format(now);

            const toSeconds = (t) => {
                const [h, m, s] = t.split(':').map(Number);
                return (h * 3600) + (m * 60) + s;
            };

            const diff = (toSeconds(currentWIBStr) - toSeconds(logTime) + 86400) % 86400;
            const isStale = diff > 600; 
            // -----------------------------

            const currentLevel = statsPart[0].replace('Lv.', '').trim();
            const nextLevel = parseInt(currentLevel, 10) + 1; 
            const thisLevel = parseInt(currentLevel, 10) - 1; 
            const expGained = statsPart[1].trim();
            const currentTotalExp = parseInt(statsPart[2].replace(/,/g, '').trim());

            // Update Status: Check for Staleness OR "terputus" message
            const statusEl = document.getElementById(`status-${index}`);
            if (isStale || line.includes("terputus")) {
                statusEl.innerText = isStale ? "Offline (Stale)" : "Offline (Disconnected)";
                statusEl.className = "status offline";
            } else {
                statusEl.innerText = "Online";
                statusEl.className = "status online";
            }

            // Update Main Stats
            document.getElementById(`time-${index}`).innerText = uDate + " | " + logTime;
            document.getElementById(`exp-${index}`).innerText = currentTotalExp.toLocaleString();
            document.getElementById(`expg-${index}`).innerText = expGained;

            // Update History List
            const logContainer = document.getElementById(`logs-${index}`);
            logContainer.innerHTML = history.map(h => `<div class="log-item">${h}</div>`).join('');

            const dbEntry = EXP_DATABASE[currentLevel];
            const dbEntry2 = EXP_DATABASE[nextLevel];
            const dbEntry3 = EXP_DATABASE[thisLevel];

            if (dbEntry) {
                const goal = dbEntry.nextLevelGoal;
                const thisExp = dbEntry3 ? dbEntry3.nextLevelGoal : 0;
                const title = dbEntry.title;
                const ntitle = dbEntry2 ? dbEntry2.title : title;

                // Safety: Prevent division by zero
                let percent = 0;
                if (goal - thisExp > 0) {
                    percent = Math.min(((currentTotalExp - thisExp) / (goal - thisExp)) * 100, 100).toFixed(2);
                }

                // Update the width
                const barEl = document.getElementById(`bar-${index}`);
                if (barEl) {
                    barEl.style.width = percent + "%";
                }

                // Update the text
                const pctEl = document.getElementById(`pct-${index}`);
                if (pctEl) {
                    pctEl.innerText = percent + "%";
                }

                document.getElementById(`rem-${index}`).innerText = (goal - currentTotalExp).toLocaleString();
                document.getElementById(`nlvle-${index}`).innerText = goal.toLocaleString();

                const lvlEl = document.getElementById(`lvl-${index}`);
                lvlEl.innerText = `${title} Lv. ${currentLevel}`;
                lvlEl.style.color = getTitleColor(title);

                const nlvlEl = document.getElementById(`nlvl-${index}`);
                nlvlEl.innerText = `${ntitle} Lv. ${nextLevel}`;
                nlvlEl.style.color = getTitleColor(ntitle);
            }

            document.getElementById(`sync-${index}`).innerText = "Synced: " + new Date().toLocaleTimeString();
        }

        createAccountUI();
        const startUpdates = () => myAccounts.forEach((_, i) => updateAccount(i));
        startUpdates();
        setInterval(startUpdates, 60000); 
    </script>
</body>
</html>
